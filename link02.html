<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>링크태그</title>
</head>
<body>
    <h1>링크태그</h1>
    <h2>절대경로</h2>
    <p>http://로 시작하는 실제 웹 서비스 주소</p>
    <a href="http://google.com" target="_blank">구글 바로가기</a>
    <a href="http://naver.com" target="_blank">네이버 바로가기</a>
    <a href="http://apple.com" target="_blank">애플 바로가기</a>
    <!-- 네이버 쇼핑 클론코딩 -->
    <div id="shopping_wrap">
        <!-- 1. 쇼핑 제목 탭 -->
        <div class="titie_controls_wrap">
            <div class="titie_wrap">
                <a href="#">쇼핑</a><img src="" alt="">
                <a href="#">맨즈</a><img src="" alt="">
                <a href="#">브랜드샵</a><img src="" alt="">
                <a href="#" class="active">MY추천</a><img src="" alt="">
                <a href="#">추천핫딜</a><img src="" alt="">
                <a href="#">쇼핑라이브</a>
            </div><!-- e : titie_wrap -->
            <div class="controls_wrap">
                <em class="current_page">1</em><span class="total_page">/11</span>
                <a href="#" class="prev_btn"><img src="" alt="이전 페이지"></a>
                <a href="#" class="next_btn"><img src="" alt="다음 페이지"></a>
            </div><!-- e: controls_wrap -->
        </div><!-- e :titie_controls_wrap  -->
        <!-- 2. 쇼핑 내용(광고, 주문, 추천태그, 상품목록) -->
        <div class="container">
            <div class="cide_bar">
                <div class="advertising_link">
                    <a href="https://www.coupang.com/" target="_blank"><em>쿠팡</em></a>
                    <a href="https://www.gmarket.co.kr/" target="_blank">G마켓</a>
                    <a href="https://www.auction.co.kr/" target="_blank">옥션</a>
                    <a href="https://www.11st.co.kr/" target="_blank"><em>11번가</em></a>
                    <a href="https://www.oliveyoung.co.kr/" target="_blank">올리브영</a>
                    <a href="https://www.ssg.com/" target="_blank">SSG닷컴</a>
                    <a href="https://www.halfclub.com/" target="_blank">하프클럽</a>
                    <a href="https://emart.ssg.com/" target="_blank">이마트몰</a>
                    <a href="https://with.gsshop.com/" target="_blank">GS SHOP</a>
                    <a href="https://www.fashionplus.co.kr/" target="_blank">패션플러스</a>
                </div><!-- e : advertising)link -->
                <div class="order_basket_btn">
                    <a href="#" class="order_btn">주문배송<img src="" alt="3"></a>
                    <a href="#" class="basket_btn">장바구니<img src="" alt="1"></a>
                </div> <!-- e: order_basket_btn  -->
                <div class="recommendation tag_list">
                    <a href="#" class="active">#출산/육아 <img src="" alt=""></a>
                    <a href="#">#화장품/미용</a>
                    <a href="#">#가구/인테리어</a>
                    <a href="#">#생활/건강</a>
                    <a href="#">#패션잡화</a>
                    <a href="#">#식품</a>
                </div><!-- e:recommendation tag list -->
            </div> <!-- e: cide_bar -->
            <div class="right_contents">
                <a href="#" class="product">
                    <p class="photo"><img src="" alt=""></p>
                    <p class="msg">불만족 시 반품가능</p>
                    <h2>자누아 편안한 경추베개</h2>
                    <div class="review_score_wrap">
                        <p class="score"><img src="" alt="별점">4.79</p>
                        <p class="review">리뷰 225</p>
                    </div><!-- e : review_score_wrap -->
                </a> <!-- *8 -->
            </div> <!-- e : right_contents -->
        </div><!-- e : container -->
        <!-- 3. 내용 더보기) -->
        <div class="more_wrap">
            <div class="center">
                <a href="#" class="left_btn"><img src="" alt="이전으로"></a>
                <div class="more_page">
                    <em>MY추천</em><span>더보기</span>
                    <em class="current_page">1</em>
                    <span class="total_page">/9</span>
                </div> <!-- e : more_page -->
                <a href="#"><img src="" alt="광고"></a>
                <a href="#" class="right_btn"><img src="" alt="다음으로"></a>
            </div>
            <a href="#" class="ad_btn">AD</a>
        </div>
    </div><!-- e:전체 shopping_wrap -->

</body>
</html>
